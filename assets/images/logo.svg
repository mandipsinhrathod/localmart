<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 559" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <style>
      .text-local-base { font-family: 'Outfit', 'Segoe UI', sans-serif; font-weight: 800; font-size: 74px; letter-spacing: -0.5px; }
      .text-tagline { font-family: 'Outfit', 'Segoe UI', sans-serif; font-weight: 500; fill: #5E717E; font-size: 24px; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- ==================== SHIELD GRAPHIC ==================== -->
  <g transform="translate(512, 190)">
    <!-- QR Code Background (Clipped to Shield) -->
    <clipPath id="shield-clip">
      <path d="M 0,-115 C 35,-115 85,-130 110,-130 C 110,-130 115,15 110,35 C 95,90 45,120 0,140 C -45,120 -95,90 -110,35 C -115,15 -110,-130 -110,-130 C -85,-130 -35,-115 0,-115 Z" />
    </clipPath>

    <g clip-path="url(#shield-clip)">
      <!-- Shield Inside Fill -->
      <path d="M -120,-150 H 120 V 160 H -120 Z" fill="#FFFFFF" />

      <!-- Stylized QR Code Blocks -->
      <g fill="#2C3E50" opacity="0.85">
        <!-- Bottom-Left Finder Pattern -->
        <rect x="-85" y="30" width="42" height="42" rx="4" />
        <rect x="-77" y="38" width="26" height="26" fill="#FFFFFF" rx="2" />
        <rect x="-69" y="46" width="10" height="10" rx="1" />

        <!-- Bottom-Right Finder Pattern -->
        <rect x="43" y="30" width="42" height="42" rx="4" />
        <rect x="51" y="38" width="26" height="26" fill="#FFFFFF" rx="2" />
        <rect x="59" y="46" width="10" height="10" rx="1" />

        <!-- Top-Right Finder Pattern -->
        <rect x="43" y="-85" width="42" height="42" rx="4" />
        <rect x="51" y="-77" width="26" height="26" fill="#FFFFFF" rx="2" />
        <rect x="59" y="-69" width="10" height="10" rx="1" />

        <!-- Small QR code pixels (scattered) -->
        <rect x="-30" y="-85" width="10" height="10" />
        <rect x="-15" y="-85" width="10" height="10" />
        <rect x="-25" y="-70" width="15" height="10" />
        <rect x="-10" y="-75" width="10" height="15" />
        <rect x="5" y="-80" width="15" height="10" />
        <rect x="25" y="-85" width="10" height="10" />
        <rect x="15" y="-70" width="10" height="15" />
        
        <rect x="-35" y="-50" width="15" height="15" />
        <rect x="-15" y="-55" width="10" height="10" />
        <rect x="-5" y="-50" width="15" height="10" />
        <rect x="15" y="-50" width="15" height="15" />

        <rect x="-35" y="-30" width="10" height="15" />
        <rect x="-20" y="-35" width="15" height="10" />
        <rect x="5" y="-35" width="10" height="25" />
        <rect x="20" y="-30" width="15" height="10" />

        <rect x="-35" y="-5" width="15" height="10" />
        <rect x="-15" y="-10" width="10" height="20" />
        <rect x="0" y="-5" width="15" height="10" />
        <rect x="20" y="-10" width="15" height="10" />
        <rect x="65" y="-30" width="10" height="15" />
        <rect x="75" y="-35" width="10" height="10" />
        <rect x="50" y="-15" width="15" height="10" />
        <rect x="70" y="-10" width="15" height="15" />

        <rect x="-35" y="15" width="20" height="10" />
        <rect x="-10" y="15" width="10" height="15" />
        <rect x="5" y="10" width="15" height="10" />
        <rect x="25" y="15" width="10" height="15" />
        <rect x="40" y="10" width="15" height="10" />

        <rect x="-10" y="75" width="15" height="10" />
        <rect x="10" y="75" width="15" height="15" />
        <rect x="-35" y="90" width="10" height="15" />
        <rect x="-20" y="85" width="15" height="10" />
        <rect x="0" y="90" width="10" height="20" />
        <rect x="-35" y="110" width="25" height="10" />
        <rect x="-5" y="115" width="15" height="10" />
        <rect x="15" y="110" width="10" height="15" />
        <rect x="30" y="115" width="20" height="10" />
      </g>
    </g>

    <!-- Shield Borders -->
    <!-- Dark base border -->
    <path d="M -96,20 C -96,60 -65,110 0,130 C 65,110 96,60 96,20" fill="none" stroke="#2C3E50" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Green right border -->
    <path d="M 96,20 C 105,0 105,-85 100,-105 C 85,-115 35,-125 0,-125" fill="none" stroke="#38A53E" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Blue top-left border -->
    <path d="M -96,-105 C -85,-115 -35,-125 0,-125" fill="none" stroke="#1E70C5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Blue Arrow (Left border + curve) -->
    <path d="M -15,48 H -60 C -85,48 -96,33 -96,13 V -105" fill="none" stroke="#1E70C5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Blue Arrow Head -->
    <polygon points="-118,-103 -96,-133 -74,-103" fill="#1E70C5" stroke="#1E70C5" stroke-width="3" stroke-linejoin="round" />

    <!-- ==================== SHOPPING CART & ITEMS ==================== -->
    <g transform="translate(10, 5)">
      <!-- Milk Carton (Blue, Tilted -15deg) -->
      <g transform="translate(-25, -45) rotate(-15)">
        <path d="M -10,20 H 10 V -15 L 0,-27 L -10,-15 Z" fill="#1E70C5" />
        <!-- Milk Label (white) -->
        <rect x="-6" y="-5" width="12" height="18" fill="#FFFFFF" rx="1" />
        <!-- Milk crease line -->
        <line x1="-10" y1="-15" x2="10" y2="-15" stroke="#FFFFFF" stroke-width="1.5" />
        <line x1="0" y1="-27" x2="0" y2="-15" stroke="#FFFFFF" stroke-width="1.5" />
      </g>

      <!-- Mobile Phone (Green, Vertical) -->
      <g transform="translate(10, -50)">
        <rect x="-13" y="-22" width="26" height="44" rx="4" fill="#38A53E" />
        <rect x="-10" y="-19" width="20" height="38" rx="2" fill="#FFFFFF" />
        <!-- Phone icon inside: green -->
        <path d="M -3,5 C -2.5,5.5 0.5,6.5 2,5 C 3.5,3.5 2.5,1.5 2,1 C 1.5,0.5 0.5,0.5 0,1 L -1,2 C -1.5,1.5 -2.5,0.5 -3,0 L -2,-1 C -1.5,-1.5 -1.5,-2.5 -2,-3 C -2.5,-3.5 -4.5,-4.5 -5,-3 C -6.5,-1.5 -5.5,1.5 -5,2 C -4.5,2.5 -3.5,4.5 -3,5 Z" fill="#38A53E" transform="scale(1.2)" />
      </g>

      <!-- Groceries (Green vegetable / carrots bag, Tilted 15deg) -->
      <g transform="translate(42, -44) rotate(10)">
        <!-- Paper bag/basket container -->
        <path d="M -12,18 H 12 V -5 L 9,-9 L 6,-5 L 3,-9 L 0,-5 L -3,-9 L -6,-5 L -9,-9 L -12,-5 Z" fill="#38A53E" />
        <!-- Leaf 1 (Left) -->
        <path d="M -8,-9 C -12,-20 -4,-22 -3,-12" fill="#38A53E" stroke="#FFFFFF" stroke-width="1" />
        <!-- Leaf 2 (Middle) -->
        <path d="M 0,-9 C 0,-24 8,-24 6,-12" fill="#38A53E" stroke="#FFFFFF" stroke-width="1" />
        <!-- Leaf 3 (Right) -->
        <path d="M 6,-9 C 10,-20 15,-18 10,-10" fill="#38A53E" stroke="#FFFFFF" stroke-width="1" />
      </g>

      <!-- Shopping Cart Basket -->
      <path d="M -48,-28 H 36 L 22,12 H -30 Z" fill="#38A53E" />
      
      <!-- Cart Handle -->
      <path d="M -48,-28 H -60 C -64,-28 -68,-24 -68,-20 V -12" fill="none" stroke="#38A53E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Cart Wheels -->
      <circle cx="-20" cy="24" r="10" fill="#38A53E" />
      <circle cx="14" cy="24" r="10" fill="#38A53E" />
    </g>
  </g>

  <!-- ==================== TEXT PART ==================== -->
  <g transform="translate(0, 415)">
    <!-- Letter L, aligned to the right of X=340 -->
    <text x="340" y="0" text-anchor="end" class="text-local-base" fill="#1E70C5">L</text>

    <!-- Custom Location O Pin & Handle centered at X=364 -->
    <g transform="translate(364, -25)">
      <!-- Green Handle/Shackle on top -->
      <path d="M -20,-14 C -20,-36 20,-36 20,-14" fill="none" stroke="#38A53E" stroke-width="8" stroke-linecap="round" />
      <!-- Blue Location Pin -->
      <path d="M 0,26 C -20,6 -20,-10 0,-10 C 20,-10 20,6 0,26 Z" fill="#1E70C5" />
      <!-- White dot inside Pin -->
      <circle cx="0" cy="5" r="7" fill="#FFFFFF" />
    </g>

    <!-- CALMART, aligned to the left of X=388 -->
    <text x="388" y="0" text-anchor="start" class="text-local-base">
      <tspan fill="#1E70C5">CAL</tspan>
      <tspan fill="#38A53E">MART</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="512" y="475" text-anchor="middle" class="text-tagline">Your Local Stores. One Scan Away.</text>
</svg>
